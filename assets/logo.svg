<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Dr. S. Hasnain Rizvi emblem">
  <defs>
    <linearGradient id="rzv-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15406b"/>
      <stop offset="100%" stop-color="#061830"/>
    </linearGradient>
    <linearGradient id="rzv-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3dca0"/>
      <stop offset="55%" stop-color="#c9a35b"/>
      <stop offset="100%" stop-color="#8a6422"/>
    </linearGradient>
    <linearGradient id="rzv-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ed1c8"/>
      <stop offset="55%" stop-color="#3a8e89"/>
      <stop offset="100%" stop-color="#1c5552"/>
    </linearGradient>
    <radialGradient id="rzv-pearl" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#f6e7c2"/>
      <stop offset="100%" stop-color="#c9a35b"/>
    </radialGradient>
  </defs>

  <!-- Navy gradient container -->
  <rect width="48" height="48" rx="11" fill="url(#rzv-bg)"/>

  <!-- 8-pointed Persian-style star: two overlapping squares -->
  <g transform="translate(24 24)">
    <rect x="-11" y="-11" width="22" height="22" fill="url(#rzv-teal)" transform="rotate(45)"/>
    <rect x="-11" y="-11" width="22" height="22" fill="url(#rzv-gold)" opacity="0.96"/>

    <!-- Inner navy disc creates depth between the star and the center -->
    <circle r="6.5" fill="#061830"/>
    <!-- Mid gold ring -->
    <circle r="4.2" fill="url(#rzv-gold)"/>
    <!-- Pearl center -->
    <circle r="2" fill="url(#rzv-pearl)"/>
  </g>

  <!-- Subtle highlight on the upper edge of the container, gives a "jeweled" feel -->
  <path d="M 11 4 Q 24 1.5 37 4" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
